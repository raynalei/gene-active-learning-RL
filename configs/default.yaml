predictor:
  model_dim: 256
  num_heads: 8
  num_layers: 4
  ff_dim: 512
  dropout: 0.1
  ensemble_size: 5
  finetune_epochs: 3
  full_retrain_epochs: 5
  full_retrain_every: 999
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 1.0e-5
eval_every_rounds: 5

active_learning:
  batch_size: 1          # B: number of experiments per round
  num_rounds: 20           # total AL rounds
  initial_labeled_size: 32 # conditions in D_0
  ood_val_fraction: 0.2    # fraction of OOD-1 candidates held as fixed val set
  ood_split_seed: 42
  # Cell-level test split — matches random_sample.py exactly
  test_ratio: 0.2          # held-out test cells, never used for training
  id_val_ratio: 0.1        # ID val cells drawn from non-OOD train cells

state:
  # Derived from model_dim=256
  # h_obs  = 2*256 + 6  = 518
  # h_pool = 3*256 + 20 = 788
  # h_pb   = 2*256 + 4  = 516
  # total  = 1822
  h_obs_dim: 518
  h_pool_dim: 788
  h_pb_dim: 516
  state_dim: 1822
  embedding_dim: 256
  uncertainty_bins: 10
  distance_bins: 10
  top_uncertainty_fraction: 0.1
  # candidate query = [z_x(256) ; u(x)(1) ; d_Dt(1) ; d_B(1)] = 259
  candidate_query_dim: 259

policy:
  cross_attn_dim: 128
  n_state_tokens: 3
  value_hidden_dim: 256

simulator:
  hidden_dim: 256
  lr: 1.0e-3
  n_outputs: 3             # [r_ood, r_cov, r_unc]
  buffer_size: 2000
  min_samples_to_train: 10

bc:
  n_teacher_episodes: 20
  epochs: 20
  lr: 1.0e-3
  teacher_uncertainty_weight: 1.0
  teacher_distance_weight: 0.2
  teacher_batch_distance_weight: 0.2

ppo:
  clip_epsilon: 0.2
  lr: 3.0e-4
  entropy_coef: 0.01
  value_coef: 0.5
  gamma: 1.0
  gae_lambda: 0.95
  ppo_epochs_per_update: 4
  ppo_batch_size: 64
  dyna_ratio_early: 2      # simulated:real before transition_step
  dyna_ratio_late: 4       # simulated:real after transition_step
  dyna_transition_step: 50 # PPO iterations before switching ratio
  max_grad_norm: 0.5

reward:
  w_ood: 1.0
  w_cov: 0.2
  w_red: 0.1
  w_unc: 0.1
  w_des: 0.5

device: "cuda"
seed: 42

training:
  n_ppo_iters: 100
